methodology_summary: |
  5-stage streaming ranking pipeline optimized for the Senior AI Engineer JD.
  Stage 1: Gated filtering with deterministic honeypot detection (skills inflation,
  temporal paradox, zero-duration expert) plus title and industry gates.
  Stage 2: Technical scoring via skill intersection (7 core ML pillars), experience
  curve (5-9 YOE peak), execution context (production verbs vs wrapper buzzwords),
  and education tier bonuses.
  Stage 3: Semantic re-ranking using all-MiniLM-L6-v2 embeddings with lazy batch
  inference and early-stopping pruning. Multi-signal behavioral calibration matrix
  incorporating 16 of 23 Redrob platform signals including temporal decay, recruiter
  response rate, notice period, geography, GitHub activity, skill assessments,
  offer acceptance, interview completion, profile completeness, recruiter saves,
  response speed, profile trust, work mode alignment, market visibility, and
  active job-seeking indicators.
  Stage 4: Monotonic aggregation with deterministic tie-breaking (candidate_id
  ascending) and JD-specific reasoning generation referencing core skill matches,
  career depth, and honest concerns.
  Stage 5: Format validation via validate_submission.py.

approach:
  scoring_formula: "Score_final = (S_base + 0.30 × semantic_similarity) × M_behavior"
  model_used: "all-MiniLM-L6-v2 (SentenceTransformer, CPU inference, ~80MB)"
  wall_clock_actual: "~38 seconds on standard CPU"

